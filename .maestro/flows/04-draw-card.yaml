# Flow: Draw a Daily Card
# Signs in, opens the draw screen, waits for the shuffle animation,
# draws a card, verifies the card is revealed, then returns to Home.
#
# Run:
#   maestro test .maestro/flows/04-draw-card.yaml \
#     --env TEST_EMAIL=test@example.com \
#     --env TEST_PASSWORD=secret123
appId: com.edwardwieczorek.magicmystics
---
- launchApp:
    clearState: true

- runFlow: ../utils/sign-in.yaml

# ── Navigate to Draw ─────────────────────────────────────────────────────────
- tapOn:
    accessibilityLabel: "Draw Your Daily Card"

- assertVisible: "Daily Draw"

# Wait for the TarotDeck shuffle animation to complete before interacting.
# The deck fades out, then the face-down card becomes tappable.
- waitForAnimationToEnd

# ── Draw the card ────────────────────────────────────────────────────────────
- tapOn:
    accessibilityLabel: "Tarot card, face down"

# The card flips and the detail panel appears. Because this hits Supabase,
# give it a moment to resolve.
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      accessibilityLabel:
        regexp: ".+, (upright|reversed)"
    timeout: 10000

# ── Return to Home ───────────────────────────────────────────────────────────
- tapOn:
    accessibilityLabel: "Go back"

- assertVisible: "Draw Your Daily Card"
