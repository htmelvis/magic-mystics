# Flow: Onboarding — name → birth date → birth time → birth location → calculating → home
#
# Prerequisites: User account exists but onboarding is NOT completed.
# Set this up by creating a fresh account (flow 02) or resetting
# onboarding_completed=false in Supabase for the test user.
#
# NOTE: Birth date and birth time steps use the native DateTimePicker
# (@react-native-community/datetimepicker). Maestro interacts with iOS
# native pickers via swipe/scroll gestures; see inline comments.
#
# Run:
#   maestro test .maestro/flows/03-onboarding.yaml \
#     --env TEST_EMAIL=test@example.com \
#     --env TEST_PASSWORD=secret123
appId: com.edwardwieczorek.magicmystics
---
- launchApp:
    clearState: false

# Sign in — should redirect to onboarding (onboarding_completed=false)
- tapOn: 'Email'
- inputText: ${TEST_EMAIL}
- tapOn: 'Password'
- inputText: ${TEST_PASSWORD}
- tapOn: 'Sign In'

# ── Step 0: Welcome ──────────────────────────────────────────────────────────
- assertVisible: 'Welcome to Magic Mystics'
- tapOn: 'Get Started'

# ── Step 1: Name ─────────────────────────────────────────────────────────────
- assertVisible: 'Step 1 of 4'
- assertVisible: 'What should we call you?'
- tapOn:
    text: 'Your name'
- inputText: 'Luna'
- tapOn: 'Continue'

# ── Step 2: Birth Date ───────────────────────────────────────────────────────
# The native DateTimePicker renders a spinner on iOS.
# Adjust the exact swipe deltas to match your target test date.
- assertVisible: 'Step 2 of 4'
- waitForAnimationToEnd
# Scroll the month column to June (month 6)
# Each full swipe ≈ 1 row on the iOS spinner
- swipe:
    direction: UP
    duration: 300
# Scroll the day column if needed
# Tap "Continue" (or equivalent CTA label on the birth-date screen) when done
- tapOn: 'Continue'

# ── Step 3: Birth Time ───────────────────────────────────────────────────────
# Similar native time picker — swipe to set hour/minute
- assertVisible: 'Step 3 of 4'
- waitForAnimationToEnd
- tapOn: 'Continue'

# ── Step 4: Birth Location ───────────────────────────────────────────────────
- assertVisible: 'Step 4 of 4'
- tapOn:
    text: 'City or town'
- inputText: 'New York, NY'
- tapOn: 'Continue'

# ── Calculating → Home ───────────────────────────────────────────────────────
# The calculating screen auto-advances; wait for it
- assertVisible: 'Calculating'
- assertVisible: 'Draw Your Daily Card'
